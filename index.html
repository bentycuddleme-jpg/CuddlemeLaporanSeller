<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Seller - Cuddleme</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-5">
        <h1 class="text-3xl font-bold text-center mb-5">Laporan Seller Cuddleme</h1>
        <form class="bg-white p-5 rounded shadow-md">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700">Product Category</label>
                    <select class="form-select mt-1 block w-full" required>
                        <option value="">Select a category</option>
                        <option value="Travego Carrier">Travego Carrier</option>
                        <option value="Ultimo Carrier">Ultimo Carrier</option>
                        <option value="Bamboo Sling">Bamboo Sling</option>
                        <option value="ATP">ATP</option>
                        <option value="Airsling">Airsling</option>
                        <option value="Baby Cape">Baby Cape</option>
                        <option value="Babywearing Fleece Jacket">Babywearing Fleece Jacket</option>
                        <option value="Blanket">Blanket</option>
                        <option value="Bobalimut">Bobalimut</option>
                        <option value="Crawling Jegging">Crawling Jegging</option>
                        <option value="Diaper Bag">Diaper Bag</option>
                        <option value="Drypad">Drypad</option>
                        <option value="Fitted Booties">Fitted Booties</option>
                        <option value="Floswim">Floswim</option>
                        <option value="Foldable Nursing Pillow">Foldable Nursing Pillow</option>
                        <option value="Foot Strap">Foot Strap</option>
                        <option value="Gendongan Permata">Gendongan Permata</option>
                        <option value="Geosfit Air">Geosfit Air</option>
                        <option value="Goswim">Goswim</option>
                        <option value="Hipseat">Hipseat</option>
                        <option value="Hoodie">Hoodie</option>
                        <option value="Hybrid Swaddlepod">Hybrid Swaddlepod</option>
                        <option value="Infant Insert">Infant Insert</option>
                        <option value="Jacket APD">Jacket APD</option>
                        <option value="Laundry Net">Laundry Net</option>
                        <option value="Levana Air Carrier">Levana Air Carrier</option>
                        <option value="Lite Carrier">Lite Carrier</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-700">Stock Quantity</label>
                    <input type="number" class="form-input mt-1 block w-full" placeholder="Enter stock quantity" required />
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="bg-blue-500 text-white font-bold py-2 px-4 rounded">Submit</button>
            </div>
        </form>
        <div class="mt-5 text-center">
            <h2 class="text-xl font-semibold">Contact Support</h2>
            <a href="https://wa.me/085792242858" class="text-blue-500">WhatsApp Support</a>
        </div>
    </div>
</body>
</html>
